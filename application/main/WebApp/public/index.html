<!doctype html>
<html lang="%LOCALE%">
    <head>
        <meta charset="UTF-8" />
        <meta content="nofollow" name="robots" />
        <meta
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
            name="viewport"
        />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="default" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="format-detection" content="telephone=no" />
        <meta name="theme-color" content="#000000" />
        <meta name="csp-nonce" content="%CSP_NONCE%" />
        <title>PlatformPlatform</title>
        <script nonce="{{cspNonce}}">
            globalThis.__webpack_nonce__ = document.querySelector('meta[name="csp-nonce"]').content;
            const o = document.createElement;
            document.createElement = (t) => {
                const e = o.call(document, t);
                if (t.toLowerCase() === "style") {
                    e.setAttribute("nonce", globalThis.__webpack_nonce__);
                }
                return e;
            };
        </script>
        <script nonce="{{cspNonce}}">
            (() => {
                var t = localStorage.getItem("theme"),
                    d = window.matchMedia("(prefers-color-scheme:dark)").matches;
                if (t === "dark" || (!t && d)) {
                    document.documentElement.classList.add("dark");
                }
            })();
        </script>
        <script nonce="{{cspNonce}}">
            (() => {
                var zoomLevel = localStorage.getItem("zoom-level");
                if (zoomLevel) {
                    document.documentElement.style.setProperty("--zoom-level", zoomLevel);
                }
            })();
        </script>
        <link rel="preconnect" href="https://fonts.cdnfonts.com" crossorigin />
        <link href="https://fonts.cdnfonts.com/css/cal-sans" rel="stylesheet" />
        <link href="/favicon.ico" rel="icon" type="image/x-icon" />
        <link href="/apple-touch-icon.png" rel="apple-touch-icon" sizes="180x180" />
        <link rel="manifest" href="/manifest.json" />
        <script src="https://sandbox.payfast.co.za/onsite/engine.js" nonce="{{cspNonce}}"></script>
        <style nonce="{{cspNonce}}">
            /* PayFast lightbox: render the engine.js-injected container as a centered fullscreen modal.
               The engine.js library appends #payfast_div_container to <body> with no positioning, so it
               flows below the app. These rules give it the modal overlay behavior users expect. */
            #payfast_div_container {
                position: fixed !important;
                inset: 0 !important;
                z-index: 2147483647 !important;
                background: rgba(0, 0, 0, 0.6) !important;
                display: flex !important;
                align-items: center !important;
                justify-content: center !important;
                width: 100vw !important;
                height: 100vh !important;
                overflow: auto !important;
            }
            #payfast_div_container iframe {
                width: min(420px, 100vw) !important;
                height: min(640px, 100vh) !important;
                max-width: 100vw !important;
                max-height: 100vh !important;
                border: 0 !important;
                border-radius: 8px !important;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5) !important;
                background: #fff !important;
            }
        </style>
    </head>
    <body id="main">
        <div id="root"></div>
    </body>
</html>
